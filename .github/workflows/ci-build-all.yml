name: 全ドキュメントのビルド

on:
  workflow_dispatch:

jobs:
  build:
    name: ドキュメントのビルド
    runs-on: windows-latest
    steps:
      - name: ブランチのチェックアウト
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          lfs: true

      - id: build-document
        name: 全ドキュメントのビルドとアップロード
        uses: ./.github/workflows/build-document
        with:
          build-script-name: "build"
