name: 全ドキュメントのビルド

on:
  workflow_dispatch:

jobs:
  build:
    name: ドキュメントのビルド
    runs-on: windows-latest
    steps:
      - name: ブランチのチェックアウト
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          lfs: true

      - id: build-document
        name: 全ドキュメントのビルドとアップロード
        uses: ./.github/workflows/build-document
        with:
          build-script-name: "build"
