name: 全ドキュメントのビルド

on:
  workflow_dispatch:

jobs:
  build:
    name: ドキュメントのビルド
    runs-on: windows-latest
    steps:
      - name: ブランチのチェックアウト
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          lfs: true

      - id: build-document
        name: 全ドキュメントのビルドとアップロード
        uses: ./.github/workflows/build-document
        with:
          build-script-name: "build"
