name: 全ドキュメントのビルド

on:
  workflow_dispatch:

jobs:
  build:
    name: ドキュメントのビルド
    runs-on: windows-latest
    steps:
      - name: ブランチのチェックアウト
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          lfs: true

      - id: build-document
        name: 全ドキュメントのビルドとアップロード
        uses: ./.github/workflows/build-document
        with:
          build-script-name: "build"
